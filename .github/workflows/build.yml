name: Deploy MkDocs

on:
  push:
    branches:
      - master  # 确保你的主分支名称正确

permissions:
  contents: write # 赋予写入权限，以便推送到 gh-pages 分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 第一步：检出代码
      - uses: actions/checkout@v4

      # 第二步：设置 Python 环境
      # 锁定为 3.11 版本，以确保 mkdocs-with-pdf 等插件不会因 3.14 兼容性问题崩溃
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 第三步：安装环境依赖
      # 加入了 glightbox, blog, 以及公式渲染所需的依赖
      - run: |
          pip install mkdocs-material \
                      mkdocs-glightbox \
                      mkdocs-blog-plugin \
                      mkdocs-material[imaging] \
                      cairosvg

      # 第四步：执行部署
      - run: mkdocs gh-deploy --force